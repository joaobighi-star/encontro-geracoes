<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontro de Gerações - PIB/RJ</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #f0f2f5; 
            display: flex;
            justify-content: center;
        }
        .container { 
            max-width: 500px; 
            width: 100%;
            background: white; 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #1a3a5a;
            color: #ffffff;
            padding: 25px;
            text-align: center;
            border-bottom: 6px solid #f39c12;
        }
        .header h1 { margin: 0; font-size: 22px; text-transform: uppercase; }
        .header p { margin: 10px 0 0; font-size: 15px; line-height: 1.4; }
        
        form { padding: 25px; }
        .texto-apoio { 
            font-size: 15px; 
            color: #333; 
            margin-bottom: 20px; 
            line-height: 1.5;
            background-color: #fff9f0;
            padding: 15px;
            border-left: 4px solid #f39c12;
            border-radius: 4px;
        }
        
        .participante-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .campo-nome { flex: 2; }
        .campo-idade { flex: 1.5; }

        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { border-color: #f39c12; outline: none; }

        button { 
            width: 100%; 
            padding: 16px; 
            background-color: #1a3a5a; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            margin-top: 20px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2c527a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ENCONTRO DE GERAÇÕES</h1>
            <p>30/05/2026 - 10hs - PIB/RJ</p>
        </div>
        
        <form id="formEvento">
            <div class="texto-apoio">
                Confirme a sua participação e a de sua família ou seus convidados. 
                Selecione a faixa etária para adequarmos as atividades.
            </div>
            
            <div id="listaParticipantes">
                <div class="participante-row">
                    <input type="text" class="campo-nome" placeholder="Nome Completo" required>
                    <select class="campo-idade" required>
                        <option value="">Faixa Etária</option>
                        <option value="0 a 5">0 a 5</option>
                        <option value="6 a 10">6 a 10</option>
                        <option value="11 a 15">11 a 15</option>
                        <option value="16 a 20">16 a 20</option>
                        <option value="21 a 30">21 a 30</option>
                        <option value="31 a 40">31 a 40</option>
                        <option value="41 a 50">41 a 50</option>
                        <option value="51 a 60">51 a 60</option>
                        <option value="acima de 60">Acima de 60</option>
                    </select>
                </div>
            </div>

            <button type="submit">Confirmar Inscrição</button>
        </form>
    </div>

    <script>
        const lista = document.getElementById('listaParticipantes');

        function configurarMonitoramento(linha) {
            const inputNome = linha.querySelector('.campo-nome');
            inputNome.addEventListener('input', function handleInput() {
                if (this.value.trim() !== "") {
                    const novaLinha = document.createElement('div');
                    novaLinha.className = 'participante-row';
                    novaLinha.innerHTML = `
                        <input type="text" class="campo-nome" placeholder="Nome do convidado">
                        <select class="campo-idade">
                            <option value="">Faixa Etária</option>
                            <option value="0 a 5">0 a 5</option>
                            <option value="6 a 10">6 a 10</option>
                            <option value="11 a 15">11 a 15</option>
                            <option value="16 a 20">16 a 20</option>
                            <option value="21 a 30">21 a 30</option>
                            <option value="31 a 40">31 a 40</option>
                            <option value="41 a 50">41 a 50</option>
                            <option value="51 a 60">51 a 60</option>
                            <option value="acima de 60">Acima de 60</option>
                        </select>
                    `;
                    lista.appendChild(novaLinha);
                    this.removeEventListener('input', handleInput);
                    configurarMonitoramento(novaLinha);
                }
            });
        }

        configurarMonitoramento(document.querySelector('.participante-row'));

        document.getElementById('formEvento').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const linhas = document.querySelectorAll('.participante-row');
            let salvos = 0;

            for (let linha of linhas) {
                const nome = linha.querySelector('.campo-nome').value.trim();
                const idade = linha.querySelector('.campo-idade').value;

                if (nome !== "" && idade !== "") {
                    const dados = { nome: nome, idade: idade };

                    try {
                        const resposta = await fetch('/api/participantes', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(dados)
                        });

                        if (resposta.ok) salvos++;
                    } catch (erro) {
                        console.error("Erro ao salvar:", erro);
                    }
                }
            }

            if (salvos > 0) {
                alert("Inscrição realizada com sucesso para " + salvos + " pessoa(s)!");
                location.reload(); 
            }
        });
    </script>
</body>
</html>
