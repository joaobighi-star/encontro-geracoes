<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontro de Gerações - PIB/RJ</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            background-color: #f0f2f5; 
            display: flex;
            justify-content: center;
        }
        .container { 
            max-width: 500px; 
            width: 100%;
            background: white; 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #1a3a5a;
            color: #ffffff;
            padding: 25px;
            text-align: center;
            border-bottom: 6px solid #f39c12;
        }
        .header h1 { margin: 0; font-size: 22px; text-transform: uppercase; }
        .header p { margin: 10px 0 0; font-size: 15px; line-height: 1.4; }
        
        form { padding: 25px; }
        .texto-apoio { 
            font-size: 14px; 
            color: #333; 
            margin-bottom: 20px; 
            line-height: 1.5;
            background-color: #fff9f0;
            padding: 15px;
            border-left: 4px solid #f39c12;
            border-radius: 4px;
        }

        .grupo-campo { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #1a3a5a; }
        
        .opcoes-radio { background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .opcao { display: flex; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .opcao input { width: auto; margin-right: 10px; }

        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        input:focus { border-color: #f39c12; outline: none; }

        .alerta-pix { font-size: 12px; color: #e67e22; font-weight: bold; margin-top: 5px; display: block; }

        button { 
            width: 100%; 
            padding: 16px; 
            background-color: #1a3a5a; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            margin-top: 10px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background-color: #2c527a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ENCONTRO DE GERAÇÕES</h1>
            <p>30/05/2026 - 10hs - PIB/RJ</p>
        </div>
        
        <form id="formEvento">
            <div class="texto-apoio">
                Cada participante deverá preencher uma ficha individual.
            </div>

            <div class="grupo-campo">
    <label>Nome Completo</label>
    <input type="text" id="nome" placeholder="Digite seu nome" required>
			</div>

			<div class="grupo-campo">
    <label>Telefone / WhatsApp</label>
    <input type="text" id="telefone" placeholder="(00) 00000-0000" required>
			</div>

            <div class="grupo-campo">
                <label>Faixa Etária</label>
                <div class="opcoes-radio">
                    <div class="opcao"><input type="radio" name="faixaEtaria" value="Até 12 anos" required> Até 12 anos</div>
                    <div class="opcao"><input type="radio" name="faixaEtaria" value="13 a 18 anos"> 13 a 18 anos</div>
                    <div class="opcao"><input type="radio" name="faixaEtaria" value="19 a 35 anos"> 19 a 35 anos</div>
                    <div class="opcao"><input type="radio" name="faixaEtaria" value="36 a 55 anos"> 36 a 55 anos</div>
                    <div class="opcao"><input type="radio" name="faixaEtaria" value="Acima de 56 anos"> Acima de 56 anos</div>
                </div>
            </div>

            <div class="grupo-campo">
                <label>Está congregando em alguma igreja?</label>
                <div class="opcoes-radio">
                    <input type="radio" name="congrega" value="SIM" required> SIM
                    <input type="radio" name="congrega" value="NAO" style="margin-left: 20px;"> NÃO
                </div>
            </div>

            <div class="grupo-campo">
                <label>Vai participar do almoço (feijoada)?</label>
                <div class="opcoes-radio">
                    <div class="opcao"><input type="radio" name="vaiAlmocar" value="SIM" required> SIM</div>
                    <span class="alerta-pix">Envie Pix R$20 para 21998672999 (Evanise)</span>
                    <div class="opcao" style="margin-top: 10px;"><input type="radio" name="vaiAlmocar" value="NAO"> NÃO</div>
                </div>
            </div>

            <div class="grupo-campo">
                <label>Atividade esportiva ou de salão</label>
                <div class="opcoes-radio">
                    <div class="opcao"><input type="radio" name="atividade" value="Futebol" required> Futebol</div>
                    <div class="opcao"><input type="radio" name="atividade" value="Vôlei"> Vôlei</div>
                    <div class="opcao"><input type="radio" name="atividade" value="Dominó"> Dominó</div>
                    <div class="opcao"><input type="radio" name="atividade" value="Dama"> Dama</div>
                    <div class="opcao"><input type="radio" name="atividade" value="Xadrez"> Xadrez</div>
                    <div class="opcao"><input type="radio" name="atividade" value="Outra"> Outra: 
                        <input type="text" id="outraAtividade" style="margin-left: 10px; padding: 5px;">
                    </div>
                    <div class="opcao"><input type="radio" name="atividade" value="Nenhuma"> Nenhuma</div>
                </div>
            </div>

            <button type="submit">Confirmar Inscrição</button>
        </form>
    </div>

    <script>
        document.getElementById('formEvento').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const dados = {
                nome: document.getElementById('nome').value,
                telefone: document.getElementById('telefone').value,
                faixaEtaria: document.querySelector('input[name="faixaEtaria"]:checked').value,
                congrega: document.querySelector('input[name="congrega"]:checked').value,
                vaiAlmocar: document.querySelector('input[name="vaiAlmocar"]:checked').value,
                atividade: document.querySelector('input[name="atividade"]:checked').value,
                outraAtividade: document.getElementById('outraAtividade').value
            };

            try {
                const resposta = await fetch('/api/participantes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (resposta.ok) {
                    alert("Inscrição realizada com sucesso!");
                    location.reload(); 
                } else {
                    alert("Erro ao salvar inscrição.");
                }
            } catch (erro) {
                console.error("Erro:", erro);
                alert("Erro de conexão.");
            }
        });
    </script>
</body>
</html>
